                    </div>
                </div>
                <div class="grid-item" data-url="https://business1.example.com">
                    <div class="grid-content">
                        <div class="icon">📊</div>
                        <h3>业务系统1</h3>
                        <p>业务服务前端</p>
                    </div>
                </div>
                <div class="grid-item" data-url="https://business2.example.com">
                    <div class="grid-content">
                        <div class="icon">📈</div>
                        <h3>业务系统2</h3>
                        <p>业务服务前端</p>
                    </div>
                </div>
                <div class="grid-item" data-url="https://business3.example.com">
                    <div class="grid-content">
                        <div class="icon">📋</div>
                        <h3>业务系统3</h3>
                        <p>业务服务前端</p>
                    </div>
                </div>
                <div class="grid-item" data-url="https://business4.example.com">
                    <div class="grid-content">
                        <div class="icon">📌</div>
                        <h3>业务系统4</h3>
                        <p>业务服务前端</p>
                    </div>
                </div>
                <div class="grid-item" data-url="https://business5.example.com">
                    <div class="grid-content">
                        <div class="icon">🎯</div>
                        <h3>业务系统5</h3>
                        <p>业务服务前端</p>
                    </div>
                </div>
                <div class="grid-item" data-url="https://business6.example.com">
                    <div class="grid-content">
                        <div class="icon">⚡</div>
                        <h3>业务系统6</h3>
                        <p>业务服务前端</p>
                    </div>
                </div>
                <div class="grid-item" data-url="https://business7.example.com">
                    <div class="grid-content">
                        <div class="icon">🌟</div>
