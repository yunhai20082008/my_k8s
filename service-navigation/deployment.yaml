apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-navigation
  labels:
    app: service-navigation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-navigation
  template:
    metadata:
      labels:
        app: service-navigation
    spec:
      containers:
        - name: service-navigation
          image: nginx:alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
          readinessProbe:
            httpGet:
              path: /
              port: http
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
      volumes:
        - name: html
          configMap:
            name: service-navigation-html
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: service-navigation-html
data:
  index.html: |
